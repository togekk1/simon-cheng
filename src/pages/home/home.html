<div class="fill" style="overflow: hidden; position: fixed">
    <!-- Intro -->
    <div class="intro fill">
        <div class="intro_bg fill" [style.background-image]="databaseService.intro_bg"
            [@bg_intro]="leave ? 'void' : 'on'"
            (@bg_intro.done)="$event.toState === 'on' && loading_hidden = true; leave && appService.intro_show = false">
        </div>
        <div class="filter fill"></div>

        <div class="title">
            <div class="intro_content">
                <div class="pre" [class]="{'enter': on_enter}">
                    <h2>All about my journey. All about my lifestyle.</h2>
                </div>
                <div class="name_enter" [class]="{'enter': on_enter}">
                    <div class="name">
                        <h1>Simon Cheng</h1>
                    </div>
                    <div class="text-right">
                        <button class="enter plain_button" [class]="{'pointer' : !prod || !disabled}"
                            [disabled]="prod && disabled"
                            (click)="disabled = true; leave = true; content_page_show = true">
                            <span class="arrow">►</span>
                            <span class="enter_text">Enter</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
